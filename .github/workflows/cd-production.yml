name: CD-Production

on:
  push:
    branches:
      - main

jobs:
  # ===== CI BACKEND =====
  ci-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: J2EE-Backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Grant execute permission for mvnw
        run: chmod +x mvnw

      - name: Run tests
        run: ./mvnw -B -ntp test

      - name: Build JAR (skip tests)
        run: ./mvnw -B -ntp package -DskipTests

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: J2EE-Backend/target/*.jar
          if-no-files-found: error
          retention-days: 7

  # ===== CI FRONTEND =====
  ci-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: J2EE-Frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: pnpm
          cache-dependency-path: J2EE-Frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build
        run: pnpm build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || '/api' }}
          VITE_WS_BASE_URL: ${{ secrets.VITE_WS_BASE_URL || '/ws' }}
          VITE_APP_ENV: production
          VITE_APP_VERSION: ${{ github.sha }}

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: J2EE-Frontend/dist
          if-no-files-found: error
          retention-days: 7

  # ===== DEPLOY PRODUCTION =====
  deploy:
    needs: [ci-backend, ci-frontend]
    runs-on: ubuntu-latest
    environment: production

    # ⚠️ QUAN TRỌNG: Continue-on-error FALSE để fail khi có lỗi
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      # ===== DOWNLOAD ARTIFACTS FROM CI =====
      - name: Download Backend Artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-jar
          path: J2EE-Backend/target/

      - name: Download Frontend Artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: J2EE-Frontend/dist/

      # ===== 1. PREPARE SERVER DIRECTORIES =====
      - name: Prepare Server Directories
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.PRODUCTION_HOST }}
          username: ${{ secrets.PRODUCTION_USER }}
          key: ${{ secrets.PRODUCTION_SSH_KEY }}
          script: |
            sudo mkdir -p /opt/airline-prod/backend
            sudo mkdir -p /opt/airline-prod/frontend/dist
            sudo mkdir -p /opt/airline-deploy
            sudo chown -R $USER:$USER /opt/airline-prod
            sudo chown -R $USER:$USER /opt/airline-deploy

      # ===== 2. UPLOAD BACKEND JAR =====
      - name: Upload Backend JAR
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: J2EE-Backend/target/
          remote_path: /opt/airline-prod/backend/
          remote_host: ${{ secrets.PRODUCTION_HOST }}
          remote_user: ${{ secrets.PRODUCTION_USER }}
          remote_key: ${{ secrets.PRODUCTION_SSH_KEY }}

      # ===== 3. UPLOAD FRONTEND DIST =====
      - name: Upload Frontend Dist
        uses: burnett01/rsync-deployments@v8
        with:
          switches: -avzr --delete
          path: J2EE-Frontend/dist/
          remote_path: /opt/airline-prod/frontend/dist/
          remote_host: ${{ secrets.PRODUCTION_HOST }}
          remote_user: ${{ secrets.PRODUCTION_USER }}
          remote_key: ${{ secrets.PRODUCTION_SSH_KEY }}

      # ===== 4. FINALIZE DEPLOY =====
      - name: Finalize Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
            host: ${{ secrets.PRODUCTION_HOST }}
            username: ${{ secrets.PRODUCTION_USER }}
            key: ${{ secrets.PRODUCTION_SSH_KEY }}
            # ⚠️ QUAN TRỌNG: Fail fast khi có lỗi
            script_stop_on_error: true
            script: |
              set -e  # Exit khi có lỗi bất kỳ

              echo "🚀 Starting deployment..."
              echo "======================================"

              # ===== BACKEND DEPLOYMENT =====
              BACKEND_DIR="/opt/airline-prod/backend"
              cd "$BACKEND_DIR"

              echo "📦 Processing backend JAR..."

              # Backup JAR cũ
              [ -f "app.jar" ] && cp app.jar app.jar.backup.$(date +%Y%m%d_%H%M%S) || true

              # Tìm JAR mới nhất (không phải backup) và rename
              NEW_JAR=$(ls -t *.jar 2>/dev/null | grep -v "backup" | head -1)
              if [ -z "$NEW_JAR" ]; then
                echo "❌ ERROR: No JAR file found!"
                exit 1
              fi

              echo "📦 New JAR: $NEW_JAR"
              mv "$NEW_JAR" app.jar

              # Fix permissions
              sudo chown airline:airline "$BACKEND_DIR/app.jar"
              sudo chmod 644 "$BACKEND_DIR/app.jar"

              # ===== FRONTEND DEPLOYMENT =====
              echo "🎨 Processing frontend..."
              sudo chown -R www-data:www-data /opt/airline-prod/frontend
              sudo chmod -R 755 /opt/airline-prod/frontend

              # ===== RESTART BACKEND SERVICE =====
              echo "🔄 Restarting airline-backend service..."

              # Restart service
              sudo systemctl restart airline

              # Chờ service start
              sleep 10

              # ⚠️ CHECK 1: Service có running không
              if ! sudo systemctl is-active --quiet airline; then
                echo "❌ ERROR: Service failed to start!"
                sudo systemctl status airline --no-pager
                echo "📋 Recent logs:"
                sudo journalctl -u airline --since "2 minutes ago" --no-pager | tail -50
                exit 1
              fi

              echo "✅ Service is running"

              # ⚠️ CHECK 2: Health check endpoint
              echo "🔍 Checking application health..."

              # Chờ thêm để application khởi động hoàn toàn
              sleep 15

              # Health check (cần có actuator hoặc health endpoint)
              HEALTH_CHECK=0
              for i in {1..12}; do
                if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
                  HEALTH_CHECK=1
                  echo "✅ Health check passed!"
                  break
                fi
                echo "⏳ Waiting for application... ($i/12)"
                sleep 5
              done

              if [ $HEALTH_CHECK -eq 0 ]; then
                echo "❌ ERROR: Health check failed!"
                echo "📋 Application logs (last 100 lines):"
                sudo journalctl -u airline --since "5 minutes ago" --no-pager | tail -100
                exit 1
              fi

              # ⚠️ CHECK 3: Kiểm tra lỗi trong logs
              echo "📋 Checking for errors in logs..."
              if sudo journalctl -u airline --since "2 minutes ago" --no-pager | grep -i "error\|exception\|failed" | grep -v "DELETE\|UPDATE"; then
                echo "⚠️  WARNING: Found errors in logs!"
                sudo journalctl -u airline --since "2 minutes ago" --no-pager | grep -i "error\|exception\|failed" | tail -20

                # Check critical errors
                if sudo journalctl -u airline --since "2 minutes ago" --no-pager | grep -qi "flywayexception\|applicationrunfailed"; then
                  echo "❌ ERROR: Critical application errors found!"
                  exit 1
                fi
              fi

              # ===== FINAL CHECK =====
              echo ""
              echo "======================================"
              echo "📋 Final status:"
              sudo systemctl status airline --no-pager | head -10
              echo ""
              echo "📋 Recent logs:"
              sudo journalctl -u airline --since "1 minute ago" --no-pager | tail -20

              # ===== RELOAD NGINX =====
              sudo systemctl reload nginx

              echo ""
              echo "======================================"
              echo "✅ Deploy completed successfully!"
